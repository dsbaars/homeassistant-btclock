name: "Lint"

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v4"

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: "Install ruff"
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "$(grep -E '^ruff==' requirements.txt)"

      - name: "Run ruff check"
        run: python3 -m ruff check custom_components tests

      - name: "Run ruff format --check"
        run: python3 -m ruff format --check custom_components tests
