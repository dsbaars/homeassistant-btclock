name: "Test"

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  pytest:
    name: "Pytest"
    runs-on: "ubuntu-latest"
    # See .forgejo/workflows/lint.yml for why we use the full python:3.14
    # container image instead of the setup-python action.
    container:
      image: "python:3.14"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v4"

      - name: "Install requirements"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_test.txt

      - name: "Run pytest"
        run: python -m pytest tests/ -v
