name: "Lint"

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    # actions/checkout is a Node action; Forgejo's act_runner doesn't inject
    # a Node runtime into custom containers, so checkout fails inside
    # python-only images. Clone manually via git (which ships in this image).
    container:
      image: "python:3.14"
    steps:
      - name: "Checkout the repository"
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git clone --depth=1 "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git" .
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout "$GITHUB_SHA"

      - name: "Install ruff"
        run: |
          python -m pip install --upgrade pip
          python -m pip install "$(grep -E '^ruff==' requirements.txt)"

      - name: "Run ruff check"
        run: python -m ruff check custom_components tests

      - name: "Run ruff format --check"
        run: python -m ruff format --check custom_components tests
