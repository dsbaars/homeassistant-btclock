name: "Lint"

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  ruff:
    name: "Ruff"
    runs-on: docker
    # catthehacker's js-24.04 image is what the btclock_v3 CI uses on this
    # Forgejo instance — it ships Node + git so actions/checkout works, and
    # leaves Python to setup-python.
    container:
      image: "ghcr.io/catthehacker/ubuntu:js-24.04"
    steps:
      - uses: "actions/checkout@v6"

      - uses: "actions/setup-python@v6"
        with:
          python-version: "3.14"
          cache: "pip"

      - name: "Install ruff"
        run: |
          python -m pip install --upgrade pip
          python -m pip install "$(grep -E '^ruff==' requirements.txt)"

      - name: "Run ruff check"
        run: python -m ruff check custom_components tests

      - name: "Run ruff format --check"
        run: python -m ruff format --check custom_components tests
