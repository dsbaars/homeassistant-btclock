name: "Lint"

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    # Forgejo's act_runner can't always resolve actions/setup-python's version
    # manifest, so skip it and run inside a python image that already has 3.14.
    # The full `python:3.14` image (Debian bookworm) is required instead of
    # `-slim`, because `-slim` omits git and actions/checkout needs it.
    container:
      image: "python:3.14"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v4"

      - name: "Install ruff"
        run: |
          python -m pip install --upgrade pip
          python -m pip install "$(grep -E '^ruff==' requirements.txt)"

      - name: "Run ruff check"
        run: python -m ruff check custom_components tests

      - name: "Run ruff format --check"
        run: python -m ruff format --check custom_components tests
